name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Unzip project file
      run: unzip parchisi-dice-collector.zip

    # الحل الحاسم: إجبار ملف build.gradle الرئيسي على قبول مستودعات تحميل OpenCV
    - name: Force Repositories into Main Build Gradle
      run: |
        sed -i '1i\allprojects { repositories { google(); mavenCentral(); maven { url = uri("https://maven.aliyun.com/repository/public") }; maven { url = uri("https://repo.maven.apache.org/maven2") } } }' parchisi-dice-collector/build.gradle.kts || true

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7'

    - name: Build with Gradle
      run: |
        cd parchisi-dice-collector
        gradle assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: parchisi-dice-collector/app/build/outputs/apk/debug/app-debug.apk
