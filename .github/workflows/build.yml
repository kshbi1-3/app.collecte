name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Unzip project file
      run: unzip parchisi-dice-collector.zip

    # إعادة كتابة ملف الإعدادات الأصلي لتضمين مستودعات المكاتب بالشكل الافتراضي الصارم
    - name: Override Settings Gradle to allow Central Repositories
      run: |
        cat << 'EOF' > parchisi-dice-collector/settings.gradle.kts
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
            repositories {
                google()
                mavenCentral()
                maven { url = uri("https://maven.aliyun.com/repository/public") }
            }
        }
        rootProject.name = "parchisi-dice-collector"
        include(":app")
        EOF

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7'

    - name: Build with Gradle
      run: |
        cd parchisi-dice-collector
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: parchisi-dice-collector/app/build/outputs/apk/debug/app-debug.apk
        
