name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Unzip project file
      run: unzip parchisi-dice-collector.zip

    # طريقة صحيحة لحقن المكاتب وتخطي خطأ OpenCV دون التسبب في مشاكل تهيئة
    - name: Fix settings.gradle.kts for OpenCV
      run: |
        cat << 'EOF' > patch.gradle
        allprojects {
            repositories {
                google()
                mavenCentral()
                maven { url 'https://maven.aliyun.com/repository/public' }
            }
        }
        EOF
        sed -i 's/mavenCentral()/mavenCentral(); google();/g' parchisi-dice-collector/settings.gradle.kts || true

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7'

    - name: Build with Gradle
      run: |
        cd parchisi-dice-collector
        gradle assembleDebug -I ../patch.gradle

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: parchisi-dice-collector/app/build/outputs/apk/debug/app-debug.apk
        
