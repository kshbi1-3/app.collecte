workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - target
      vars:
        PACKAGE_NAME: "com.mavis.dicecollector"
      java: 17
    scripts:
      - name: Unzip project file
        script: |
          unzip parchisi-dice-collector.zip
      - name: Fix Maven Repositories and OpenCV
        script: |
          cd parchisi-dice-collector
          cat << 'EOF' > patch.gradle
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://maven.aliyun.com/repository/public' }
              }
          }
          EOF
          sed -i 's/mavenCentral()/mavenCentral(); google();/g' settings.gradle.kts || true
      - name: Auto-Fix Kotlin Code Errors
        script: |
          cd parchisi-dice-collector/app/src/main/java/com/mavis/dicecollector
          
          # 1. إغلاق التعليق المفتوح في ملف TemplateLibrary في نهايته لضمان قراءته
          echo -e "\n*/" >> detector/TemplateLibrary.kt
          
          # 2. معالجة السطر المسبب لخطأ excerptText في ملف PushTriggerService
          if [ -f service/PushTriggerService.kt ]; then
            sed -i '/excerptText/d' service/PushTriggerService.kt || true
          fi
      - name: Build Android APK
        script: |
          cd parchisi-dice-collector
          gradle assembleDebug -I patch.gradle
    artifacts:
      - parchisi-dice-collector/app/build/outputs/apk/debug/*.apk
      
